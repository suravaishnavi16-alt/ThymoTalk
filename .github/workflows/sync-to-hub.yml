name: Sync to Hugging Face Hub
# GitHub Action to sync repository with Hugging Face Space 'VoiceEmotion'
on:
  push:
    branches: [main]

  # to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true
      - name: Push to hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: git push --force https://suravaishnavi16-alt:$HF_TOKEN@huggingface.co/spaces/suravaishnavi16-alt/VoiceEmotion main
